<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中文筆順與部首學習網 - SEN 友善版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        body {
            font-family: 'PingFang TC', 'Heiti TC', 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
            background-color: #fcfaf2; 
            transition: background-color 0.5s, background-image 0.5s;
        }
        .bg-pattern {
            background-image: url('https://www.transparenttextures.com/patterns/rice-paper-2.png');
        }
        .kaishu {
            font-family: 'KaiTi', 'BiauKai', 'DFKai-SB', 'STKaiti', serif; 
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-4px); }
            40% { transform: translateX(4px); }
            60% { transform: translateX(-2px); }
            80% { transform: translateX(2px); }
        }
        .shake { animation: shake 0.4s ease-in-out; }
        
        @keyframes pop {
            0% { transform: scale(1); }
            40% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        .pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        @keyframes starPop {
            0% { transform: scale(0) rotate(-45deg); opacity: 0; }
            70% { transform: scale(1.5) rotate(15deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        .star-animate { animation: starPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes floatAnim {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .anim-float { animation: floatAnim 2s ease-in-out infinite; }
        
        @keyframes pulseAnim {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        .anim-pulse { animation: pulseAnim 1.5s ease-in-out infinite; }
        
        @keyframes spinSlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .anim-spin-slow { animation: spinSlow 8s linear infinite; }

        @keyframes bounceSide {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(15px); }
        }
        .anim-bounce-side { animation: bounceSide 2s ease-in-out infinite; }

        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }

        .intro-card-bg {
            background: linear-gradient(135deg, #f0fdfa 0%, #e0f2fe 100%);
        }
        
        .formula-card {
            background: repeating-linear-gradient(45deg, #f8fafc, #f8fafc 10px, #ffffff 10px, #ffffff 20px);
        }

        .lego-block {
            box-shadow: inset 0 -3px 0 rgba(0,0,0,0.2);
            border-radius: 4px;
            position: relative;
        }
        .lego-block::before {
            content: '';
            position: absolute;
            top: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 4px;
            background: inherit;
            border-radius: 2px 2px 0 0;
            filter: brightness(1.1);
        }

        /* 感官友善 / 專注模式 */
        body.focus-mode {
            background-color: #f3f4f6; 
        }
        body.focus-mode .bg-pattern {
            background-image: none !important; 
        }
        body.focus-mode .intro-card-bg {
            background: #ffffff !important; 
            border-color: #e5e7eb !important;
        }
        body.focus-mode .anim-float, 
        body.focus-mode .anim-pulse, 
        body.focus-mode .anim-bounce-side, 
        body.focus-mode .anim-spin-slow {
            animation: none !important;
            transform: none !important;
        }

        .modal-enter { opacity: 1 !important; pointer-events: auto !important; }
        .modal-enter > div { transform: scale(1) !important; }
        
        .tts-btn {
            transition: transform 0.2s, background-color 0.2s;
        }
        .tts-btn:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body class="text-gray-800 flex flex-col lg:flex-row h-[100dvh] overflow-hidden bg-pattern" onclick="window.initAudio()">

    <!-- 左側邊欄 -->
    <div class="w-full lg:w-80 bg-white shadow-xl flex flex-col z-10 lg:h-[100dvh] border-b lg:border-r lg:border-b-0 border-gray-200 flex-shrink-0">
        <div class="p-3 lg:p-4 bg-amber-700 text-white shadow-md relative flex flex-col gap-2">
            <div class="flex justify-between items-center w-full">
                <h1 class="text-xl font-bold tracking-widest text-center flex-1">詞彙遊樂園</h1>
                <div class="flex gap-2">
                    <button id="focus-toggle" onclick="window.toggleFocusMode(event)" class="text-sm px-2 py-1 bg-white/20 hover:bg-white/40 rounded-lg transition-all font-bold tracking-wide border border-white/30 text-white" title="開啟專注模式">🎮 遊戲</button>
                    <button id="sound-toggle" onclick="window.toggleSound(event)" class="text-2xl hover:scale-110 transition-transform focus:outline-none" title="音效開關">🔊</button>
                </div>
            </div>
        </div>
        
        <div class="flex gap-1 p-2 bg-amber-50 text-sm font-bold border-b border-amber-100 shadow-inner justify-around">
            <button onclick="window.filterDifficulty('all', this)" class="diff-btn flex-1 px-1 py-1 rounded-md text-amber-900 bg-amber-200 shadow-sm border border-amber-300 transition-all">全部</button>
            <button onclick="window.filterDifficulty(1, this)" class="diff-btn flex-1 px-1 py-1 rounded-md text-gray-500 hover:bg-amber-100 border border-transparent transition-all">⭐初階</button>
            <button onclick="window.filterDifficulty(2, this)" class="diff-btn flex-1 px-1 py-1 rounded-md text-gray-500 hover:bg-amber-100 border border-transparent transition-all">⭐⭐中階</button>
            <button onclick="window.filterDifficulty(3, this)" class="diff-btn flex-1 px-1 py-1 rounded-md text-gray-500 hover:bg-amber-100 border border-transparent transition-all">⭐⭐⭐挑戰</button>
        </div>

        <ul id="word-list" class="flex flex-row lg:flex-col overflow-x-auto lg:overflow-y-auto no-scrollbar p-2 lg:p-3 gap-2 bg-[#faf8ec] lg:flex-1">
        </ul>
    </div>

    <!-- 右側主內容區 -->
    <div class="flex-1 h-[100dvh] overflow-y-auto p-4 md:p-8 lg:p-10 flex flex-col items-center relative">
        
        <!-- 頂部：星星分數與進度條 -->
        <div class="w-full max-w-5xl 2xl:max-w-6xl flex flex-col md:flex-row justify-between items-center mb-4 md:mb-8 gap-3 md:gap-4 mx-auto">
            <div class="w-full md:w-2/3 flex flex-col gap-2">
                <div class="flex justify-between items-end px-1">
                    <div class="bg-yellow-100 border-2 border-yellow-400 rounded-full px-4 py-1.5 shadow-sm flex items-center gap-2">
                        <span class="text-xl md:text-2xl filter drop-shadow-sm">⭐</span>
                        <span class="font-bold text-yellow-700 text-lg md:text-xl tracking-wide">收集：<span id="score-display" class="text-2xl ml-1">0</span></span>
                    </div>
                    <div id="combo-badge" class="hidden font-black text-white bg-gradient-to-r from-red-500 to-orange-500 px-4 py-1 rounded-full shadow-md transform rotate-2 z-50 text-lg md:text-xl border-2 border-white transition-all duration-300 whitespace-nowrap">
                        🔥 <span id="combo-count">2</span> 連擊！
                    </div>
                </div>
                <div class="w-full bg-white/80 rounded-full h-3 md:h-4 shadow-inner border border-yellow-200 overflow-hidden relative">
                    <div id="score-progress-bar" class="bg-gradient-to-r from-yellow-300 to-amber-500 h-full rounded-full transition-all duration-700 ease-out relative" style="width: 0%">
                        <div class="absolute top-0 left-0 bottom-0 right-0 bg-gradient-to-r from-transparent via-white/40 to-transparent -translate-x-full animate-[shimmer_2s_infinite]"></div>
                    </div>
                </div>
            </div>
            
            <div id="cheer-badge" class="hidden font-bold text-white bg-gradient-to-r from-orange-400 to-red-500 px-6 py-2 rounded-full shadow-lg transform -rotate-3 z-50 text-xl md:text-2xl whitespace-nowrap">
                太神啦！🔥
            </div>
        </div>

        <!-- 階段一：視覺化情境引入區 -->
        <div id="intro-section" class="w-full max-w-4xl mx-auto mt-4 md:mt-10 flex flex-col items-center justify-center fade-in-up px-2">
            <div class="intro-card-bg border-4 border-teal-200 rounded-3xl p-6 md:p-12 shadow-xl w-full flex flex-col items-center text-center relative overflow-hidden transition-colors">
                <span class="absolute top-3 left-3 md:top-5 md:left-5 bg-teal-500 text-white px-3 py-1 rounded-full font-bold text-xs md:text-base shadow-sm tracking-widest">情境猜一猜</span>
                
                <div id="intro-visual" class="text-7xl md:text-9xl my-6 md:my-10 filter drop-shadow-xl anim-pulse"></div>
                
                <div class="bg-white/90 px-6 py-4 rounded-2xl shadow-sm mb-4 md:mb-6 w-full max-w-xl mx-auto border border-amber-100 flex flex-col gap-2">
                    <div id="intro-context" class="flex items-center justify-center gap-3"></div>
                </div>

                <div id="intro-question" class="flex items-center justify-center gap-3 bg-white/70 px-4 py-3 md:px-8 md:py-5 rounded-2xl border border-teal-100 shadow-sm mb-6 md:mb-10 w-full max-w-2xl mx-auto"></div>
                
                <button onclick="window.revealWord()" class="bg-gradient-to-b from-amber-400 to-amber-600 hover:from-amber-500 hover:to-amber-700 text-white text-xl md:text-2xl font-bold py-3 px-8 md:py-5 md:px-12 rounded-full shadow-lg transform transition-transform hover:scale-105 active:scale-95 flex items-center gap-3 focus:outline-none">
                    <span>💡</span> 揭曉答案並學寫字
                </button>
            </div>
        </div>

        <!-- 階段二：正式學習區 -->
        <div id="learning-section" class="w-full flex flex-col items-center hidden fade-in-up max-w-5xl 2xl:max-w-6xl pb-10 px-1 sm:px-2 mx-auto">
            
            <div class="mb-4 md:mb-8 mt-2 w-full flex flex-col items-center">
                <div id="word-display" class="text-5xl sm:text-6xl md:text-8xl kaishu flex space-x-3 md:space-x-6 justify-center flex-wrap gap-y-4 text-gray-800">
                </div>
                <div class="text-gray-500 mt-4 font-bold tracking-widest bg-white/80 px-5 py-1.5 rounded-full border border-gray-200 shadow-sm text-sm md:text-lg">👆 點擊上方單字來切換學習</div>
            </div>

            <!-- 第一區：單字特訓 -->
            <div class="bg-white/95 backdrop-blur-sm rounded-2xl md:rounded-3xl shadow-xl p-4 sm:p-5 lg:p-10 flex flex-col lg:flex-row items-center lg:items-stretch gap-5 lg:gap-10 w-full border-4 border-amber-100/50 mb-6 md:mb-10 transition-colors">
                
                <div class="flex flex-col items-center justify-start flex-shrink-0 w-full lg:w-[400px]">
                    <div class="relative w-[260px] h-[260px] sm:w-[320px] sm:h-[320px] lg:w-[350px] lg:h-[350px] bg-white border-4 border-amber-700 rounded-xl shadow-md overflow-hidden" id="canvas-container">
                        <div class="absolute inset-0 pointer-events-none opacity-50">
                            <div class="w-full h-full border-b-2 border-dashed border-amber-300 absolute top-1/2 transform -translate-y-1/2"></div>
                            <div class="w-full h-full border-r-2 border-dashed border-amber-300 absolute left-1/2 transform -translate-x-1/2"></div>
                            <div class="w-full h-full absolute border-b-2 border-dashed border-amber-300 transform rotate-45 scale-150 origin-center"></div>
                            <div class="w-full h-full absolute border-b-2 border-dashed border-amber-300 transform -rotate-45 scale-150 origin-center"></div>
                        </div>
                        <div id="character-canvas" class="absolute inset-0 z-10 cursor-pointer" style="touch-action: none;" title="點擊田字格進行書寫測驗！"></div>
                        
                        <div id="success-animation" class="absolute inset-0 z-20 pointer-events-none flex items-center justify-center hidden">
                            <span class="text-7xl lg:text-9xl filter drop-shadow-lg">🌟</span>
                        </div>
                    </div>

                    <div class="mt-5 lg:mt-8 flex justify-center gap-3 lg:gap-5 w-full">
                        <button onclick="window.playAnimation()" class="px-5 py-3 lg:px-8 lg:py-4 bg-amber-600 hover:bg-amber-700 text-white rounded-full shadow-md transition-transform active:scale-95 font-bold text-lg lg:text-2xl flex items-center gap-1 lg:gap-2 focus:outline-none">
                            ▶️ 播放
                        </button>
                        <button onclick="window.startQuiz()" class="px-5 py-3 lg:px-8 lg:py-4 bg-teal-600 hover:bg-teal-700 text-white rounded-full shadow-md transition-transform active:scale-95 font-bold text-lg lg:text-2xl flex items-center gap-1 lg:gap-2 relative overflow-hidden group focus:outline-none whitespace-nowrap">
                            <span class="relative z-10 flex items-center">✍️ 自己寫 <span class="ml-1 lg:ml-3 text-xs lg:text-base bg-yellow-400 text-yellow-900 px-2 py-0.5 lg:py-1 rounded-full font-extrabold border border-yellow-500 shadow-sm leading-none">⭐ 2分</span></span>
                        </button>
                    </div>
                </div>

                <div class="flex-1 w-full flex flex-col justify-between" id="right-info-panel">
                    <div>
                        <div class="flex items-center gap-2 md:gap-3 border-b-4 border-amber-200 pb-2 md:pb-4 mb-4 md:mb-6">
                            <span class="text-3xl lg:text-5xl">🕵️</span>
                            <h2 class="text-2xl lg:text-4xl font-bold text-amber-900 tracking-wide">字形密碼戰</h2>
                        </div>
                        
                        <div class="bg-[#fffdf7] rounded-xl lg:rounded-3xl p-4 sm:p-5 lg:p-8 border-2 border-amber-100 shadow-sm flex flex-col gap-4 lg:gap-6 relative transition-colors">
                            
                            <div class="flex items-center justify-between bg-white px-3 lg:px-6 py-2 lg:py-4 rounded-xl border border-gray-200 shadow-inner w-full gap-2" id="info-char-container">
                                <!-- Target Character Injection -->
                            </div>

                            <div class="flex flex-col items-center gap-2 lg:gap-4 w-full">
                                <span class="text-gray-600 font-bold text-lg lg:text-2xl self-start pt-1 lg:pt-2">1. 找部首：</span>
                                <span id="game-status" class="text-sm lg:text-xl font-bold text-amber-600 bg-amber-100 px-3 lg:px-6 py-1.5 lg:py-3 rounded-full transition-colors duration-300 w-full text-center max-w-xl">選出對的部首解開防錯密碼！</span>
                                <div id="radical-options" class="flex gap-3 lg:gap-6 flex-wrap justify-center w-full mt-1 lg:mt-3">
                                </div>
                            </div>

                            <div class="flex flex-col items-center w-full transition-all duration-700 ease-in-out mt-2 lg:mt-5" id="components-section" style="opacity: 0.3; filter: grayscale(100%); pointer-events: none;">
                                <span class="text-gray-600 font-bold text-lg lg:text-2xl self-start pt-1 lg:pt-2 mb-2 lg:mb-4">2. 拆字與防錯密碼：</span>
                                
                                <div class="w-full max-w-2xl bg-white border-2 border-teal-200 rounded-xl lg:rounded-3xl p-4 lg:p-6 shadow-sm">
                                    <div id="info-components" class="flex flex-wrap justify-center items-center gap-2 lg:gap-4 transition-all duration-300 mb-3 lg:mb-5 pb-3 lg:pb-5 border-b-2 border-dashed border-gray-200">
                                        <span class="text-2xl lg:text-4xl text-gray-400 kaishu font-bold">???</span>
                                    </div>
                                    
                                    <div id="char-hint-box" class="hidden">
                                        <div class="flex items-start gap-2 lg:gap-4 bg-red-50 p-3 lg:p-5 rounded-lg lg:rounded-2xl border border-red-200">
                                            <span class="text-2xl lg:text-4xl mt-0.5 lg:mt-1">🚨</span>
                                            <div class="flex-1">
                                                <span class="text-base lg:text-xl font-bold text-red-800 block mb-1 lg:mb-2">防錯密碼口訣</span>
                                                <div class="flex items-center gap-2">
                                                    <p id="char-hint-text" class="text-base lg:text-xl text-gray-800 font-medium leading-relaxed tracking-wide flex-1"></p>
                                                    <button onclick="window.speakText(document.getElementById('char-hint-text').textContent, event)" class="tts-btn inline-flex items-center justify-center w-10 h-10 lg:w-12 lg:h-12 rounded-full bg-red-100 text-red-600 hover:bg-red-200 transition-colors shadow-sm focus:outline-none flex-shrink-0" title="朗讀">🗣️</button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                    
                    <div class="mt-4 lg:mt-6 bg-blue-50 border-l-8 border-blue-400 p-4 lg:p-6 rounded-lg lg:rounded-2xl shadow-sm transition-all duration-300 max-w-3xl mx-auto w-full">
                        <div id="quiz-message" class="text-blue-800 font-bold text-base lg:text-xl flex items-center gap-2 lg:gap-3 transition-all justify-center">
                            <span>💡</span> 點擊左邊「▶️ 播放」看筆順，或「✍️ 自己寫」拿星星！
                        </div>
                    </div>
                </div>
            </div>

            <!-- 第二區：詞語應用 -->
            <div class="w-full flex flex-col gap-4">
                <div class="flex items-center gap-2 md:gap-4 mb-1 md:mb-4 px-1 md:px-2 border-b-4 border-amber-700 pb-2 inline-flex self-start">
                    <span class="text-3xl md:text-5xl">📖</span>
                    <h2 class="text-2xl md:text-4xl font-bold text-amber-900 tracking-wide">詞語全貌與應用</h2>
                </div>
                
                <div id="word-explanation" class="px-5 py-5 md:px-10 md:py-8 bg-[#fdf8ed] border-2 border-amber-200 rounded-2xl md:rounded-3xl shadow-sm w-full max-w-4xl mx-auto transition-all hover:shadow-md mt-1 md:mt-2">
                </div>

                <div id="word-advanced-usage" class="w-full bg-blue-50 border-2 border-blue-200 rounded-2xl md:rounded-3xl p-4 md:p-10 shadow-sm hidden fade-in-up mt-1 md:mt-4 transition-colors">
                </div>
            </div>

        </div>
    </div>

    <!-- 🏆 里程碑慶祝彈窗 -->
    <div id="milestone-modal" class="fixed inset-0 z-[100] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 bg-black/60 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-8 md:p-14 shadow-2xl flex flex-col items-center transform scale-90 transition-transform duration-300 text-center border-8 border-yellow-400 max-w-2xl w-11/12">
            <span class="text-7xl md:text-9xl mb-4 animate-bounce filter drop-shadow-md">🏆</span>
            <h2 class="text-3xl md:text-5xl font-black text-amber-600 mb-4 tracking-wide">太厲害了！</h2>
            <p class="text-xl md:text-3xl font-bold text-gray-700 mb-8 leading-relaxed">
                你已經成功收集了 <span id="milestone-score-text" class="text-red-500 text-4xl md:text-6xl mx-2 font-black">50</span> 顆星星！<br>
                <span id="milestone-subtext" class="text-lg md:text-2xl text-gray-500 mt-2 block">繼續解鎖下一個成就吧！</span>
            </p>
            <button onclick="window.closeMilestone()" class="bg-gradient-to-b from-yellow-400 to-yellow-600 text-white font-bold text-xl md:text-2xl px-10 py-4 rounded-full shadow-lg hover:scale-105 active:scale-95 transition-all w-full md:w-auto focus:outline-none">
                繼續闖關 🚀
            </button>
            <div id="confetti-container" class="absolute inset-0 pointer-events-none overflow-hidden rounded-3xl"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. 全域變數強制掛載到 Window 物件，徹底解決 ReferenceError
        // ==========================================
        window.focusMode = false;
        window.audioCtx = null;
        window.soundEnabled = true;
        window.writer = null;
        window.activeWordBtn = null;
        window.currentWord = "";
        window.globalScore = 0;
        window.sentenceAttemptCount = 0;
        window.currentMistakes = 0;
        window.usedHint = false;
        window.currentFilter = 'all';
        window.currentCombo = 0;

        window.MAX_SCORE = 140; 
        window.MILESTONES = [50, 100, 140];
        window.reachedMilestones = new Set();
        window.completedTasks = new Set();
        window.charDataCache = {};

        // ==========================================
        // 2. 核心功能庫與音效系統
        // ==========================================
        window.extractEmoji = function(str) {
            const regex = /[\u{1F300}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{1F1E0}-\u{1F1FF}\u{1F200}-\u{1F2FF}\u{1F900}-\u{1F9FF}\u{1FA70}-\u{1FAFF}\u{1F004}\u{1F0CF}\u{1F170}-\u{1F251}]/u;
            const match = str.match(regex);
            return match ? match[0] : '';
        };

        window.speakText = function(text, event) {
            if (event) {
                event.stopPropagation();
                event.preventDefault();
            }
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const cleanText = text.replace(/<[^>]*>?/gm, '').replace(/\[|\]/g, ''); 
                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.lang = 'zh-HK'; 
                utterance.rate = 0.85; 
                window.speechSynthesis.speak(utterance);
            } else {
                alert("您的瀏覽器不支援語音朗讀功能。");
            }
        };

        window.toggleFocusMode = function(e) {
            e.stopPropagation();
            window.focusMode = !window.focusMode;
            const body = document.body;
            const btn = document.getElementById('focus-toggle');
            
            if (window.focusMode) {
                body.classList.add('focus-mode');
                btn.innerHTML = '🧘 專注';
                btn.classList.add('bg-white/80', 'text-amber-900', 'shadow-sm');
                btn.classList.remove('bg-white/20', 'text-white');
            } else {
                body.classList.remove('focus-mode');
                btn.innerHTML = '🎮 遊戲';

            const countDisplay = document.getElementById('combo-count');
            
            if (isCorrect) {
                window.currentCombo++;
                if (window.currentCombo >= 2) {
                    countDisplay.textContent = window.currentCombo;
                    badge.classList.remove('hidden', 'pop');
                    void badge.offsetWidth; 
                    badge.classList.add('pop');
                    
                    if (window.currentCombo % 3 === 0) {

                }
            } else {

                badge.classList.add('hidden');
            }

            btn.classList.add('bg-amber-200', 'text-amber-900', 'border-amber-300', 'shadow-sm');

        window.renderWordList = function() {
            const listContainer = document.getElementById('word-list');
            listContainer.innerHTML = '';
            
            const filteredWords = window.currentFilter === 'all' ? wordDataList : wordDataList.filter(w => w.level === window.currentFilter);
            
            if (window.activeWordBtn && window.activeWordBtn.parentNode) {
                window.activeWordBtn.classList.remove('bg-amber-200', 'border-amber-600', 'shadow-sm');
                window.activeWordBtn = null;
            }

            filteredWords.forEach((item, index) => {
                const li = document.createElement('li');
                li.className = 'flex-shrink-0 lg:w-full'; 
                
                const btn = document.createElement('button');
                btn.className = 'w-full whitespace-nowrap lg:whitespace-normal text-center lg:text-left px-4 py-2 lg:py-3 rounded-xl text-base lg:text-lg font-bold text-amber-900 transition-all hover:bg-amber-100 hover:scale-[1.02] focus:outline-none border-2 border-transparent flex justify-between items-center';
                
                let stars = '';
                for(let i=0; i<item.level; i++) stars += '⭐';
                btn.innerHTML = `<span>${item.word}</span> <span class="text-xs opacity-70">${stars}</span>`;
                
                btn.onclick = () => {
                    window.playSound('pop');
                    if(window.activeWordBtn) {
                        window.activeWordBtn.classList.remove('bg-amber-200', 'border-amber-600', 'shadow-sm');
                    }
                    btn.classList.add('bg-amber-200', 'border-amber-600', 'shadow-sm');
                    window.activeWordBtn = btn;
                    window.showVisualIntro(item.word);
                };
                li.appendChild(btn);
                listContainer.appendChild(li);

                if(index === 0) setTimeout(() => btn.click(), 50);
            });

        window.checkSentence = function(btn, option, answer, feedbackText) {
            if (btn.disabled) return;
            const container = document.getElementById('sentence-options');
            const feedback = document.getElementById('sentence-feedback');
            const iconSpan = btn.querySelector('.icon-span');

            if (option === answer) {
                window.playSound('correct');
                window.updateCombo(true);
                if (!window.completedTasks.has(`sentence_${window.currentWord}`)) {
                    window.completedTasks.add(`sentence_${window.currentWord}`);
                    window.addScore(1);
                    feedback.innerHTML = `✨ ${feedbackText} <span class="text-yellow-500 float-right">⭐ +1</span>`;
                } else {
                    feedback.innerHTML = `✨ ${feedbackText}`;
                }

                window.showCheer();
                if(iconSpan) iconSpan.textContent = '✅';
                btn.className = "w-full text-left px-4 py-3 md:px-6 md:py-5 bg-emerald-500 text-white font-bold rounded-xl shadow-md text-lg md:text-2xl pop transition-all border-2 border-emerald-600 flex items-center gap-2 md:gap-4";
                feedback.className = "mt-4 md:mt-5 text-lg md:text-2xl font-bold p-4 md:p-5 rounded-xl border-2 border-emerald-300 bg-emerald-100 text-emerald-900 pop transition-all block shadow-sm";

                Array.from(container.children).forEach(child => {
                    child.disabled = true;
                    if(child !== btn) {
                        child.className = "w-full text-left px-4 py-3 md:px-6 md:py-5 bg-gray-200 text-gray-400 font-bold rounded-xl text-lg md:text-2xl transition-all opacity-50 cursor-not-allowed flex items-center gap-2 md:gap-4";
                    }
                });
            } else {
                window.playSound('wrong');
                window.updateCombo(false);
                if(iconSpan) iconSpan.textContent = '❌';
                btn.className = "w-full text-left px-4 py-3 md:px-6 md:py-5 bg-gray-200 text-gray-400 font-bold rounded-xl text-lg md:text-2xl shake transition-all opacity-50 cursor-not-allowed flex items-center gap-2 md:gap-4";
                btn.disabled = true;
                
                window.sentenceAttemptCount++;
                
                if (window.sentenceAttemptCount === 1) {
                    let hiddenOne = false;
                    Array.from(container.children).forEach(child => {
                        const childOpt = child.getAttribute('data-opt');
                        if (childOpt !== answer && childOpt !== option && !hiddenOne) {
                            child.classList.add('opacity-20', 'pointer-events-none');
                            hiddenOne = true;
                        }
                        if (childOpt === answer) {
                            child.classList.add('border-4', 'border-emerald-400');

                            if(emojiSpan) emojiSpan.classList.add('scale-150', 'animate-bounce', 'transform', 'origin-right');
                        }

                    feedback.innerHTML = `🤔 不太對喔，我幫你刪掉一個錯誤選項，再看清楚提示試試看！`;

                    feedback.innerHTML = `🤔 還是不對喔，答案就在剩下的選項裡！`;
                    feedback.className = "mt-4 md:mt-5 text-lg md:text-xl font-bold p-4 md:p-5 rounded-xl border-2 border-red-300 bg-red-50 text-red-800 transition-all block";

            }
        };

                btn.onclick = () => {
                    window.playSound('pop');
                    window.selectChar(char, btn);
                };
                display.appendChild(btn);
            });

            if (display.children.length > 0) {
                window.selectChar(word[0], display.children[0]);
            }
        };

        window.selectChar = function(char, element) {
            document.querySelectorAll('.char-btn').forEach(btn => {
                btn.classList.remove('border-red-500', 'text-red-600');
            });
            if (element) {
                element.classList.add('border-red-500', 'text-red-600');
                element.classList.add('pop');
                setTimeout(() => element.classList.remove('pop'), 400);
            }

            const rightPanel = document.getElementById('right-info-panel');
            if (rightPanel) {
                rightPanel.classList.remove('fade-in-up');
                void rightPanel.offsetWidth; 
                rightPanel.classList.add('fade-in-up');
            }

            const charHeader = document.getElementById('info-char-container');
            if (charHeader) {
                charHeader.innerHTML = `
                    <div class="flex items-center gap-2">
                        <span class="text-gray-600 font-bold text-lg lg:text-2xl whitespace-nowrap">目標字：</span>
                        <span id="info-char" class="font-bold text-4xl lg:text-7xl kaishu text-amber-700 bg-amber-50 px-4 lg:px-8 py-1 lg:py-2 rounded-lg lg:rounded-2xl shadow-sm border border-amber-200 inline-block transition-all hover:scale-105 cursor-pointer" onclick="window.playSound('pop')">${char}</span>
                    </div>
                    <button onclick="window.speakText('${char}', event)" class="tts-btn inline-flex items-center justify-center w-12 h-12 lg:w-16 lg:h-16 rounded-full bg-amber-100 text-amber-600 hover:bg-amber-200 shadow-sm focus:outline-none opacity-80 hover:opacity-100 flex-shrink-0 text-xl lg:text-3xl" title="朗讀">🗣️</button>
                `;
            }

            const charData = dict[char] || { radical: '？', components: ['資料建設中'], hint: '暫無提示' };
            
            document.getElementById('components-section').style.opacity = '0.3';
            document.getElementById('components-section').style.filter = 'grayscale(100%)';
            document.getElementById('info-components').innerHTML = '<span class="text-3xl text-gray-400 kaishu font-bold">???</span>';
            document.getElementById('char-hint-box').classList.add('hidden');
            
            window.setupRadicalGame(charData.radical, charData.components, charData.hint);
            window.setQuizMessage('💡 點擊左邊「▶️ 播放」看筆順，或「✍️ 自己寫」拿 2 顆星星！⭐', 'blue');

            const canvas = document.getElementById('character-canvas');
            canvas.innerHTML = ''; 
            document.getElementById('success-animation').classList.add('hidden');
            document.getElementById('success-animation').classList.remove('star-animate');
            
            let canvasSize = 260; 
            if (window.innerWidth >= 1024) canvasSize = 350; 
            else if (window.innerWidth >= 640) canvasSize = 320; 

            window.writer = HanziWriter.create('character-canvas', char, {
                width: canvasSize,
                height: canvasSize,
                padding: 20,
                strokeAnimationSpeed: 1.5,
                delayBetweenStrokes: 100,
                showOutline: true,
                strokeColor: '#b91c1c', 
                radicalColor: '#14b8a6', 
                outlineColor: '#e5e7eb',
                drawingWidth: 30,
                charDataLoader: function(c, onComplete) {
                    if (window.charDataCache[c]) {
                        onComplete(window.charDataCache[c]);
                    } else {
                        fetch(`https://cdn.jsdelivr.net/npm/hanzi-writer-data-tc@1.0.1/${c}.json`)
                            .then(res => res.ok ? res.json() : fetch(`https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0/${c}.json`).then(r => r.json()))
                            .then(data => { window.charDataCache[c] = data; onComplete(data); })
                            .catch(err => {
                                canvas.innerHTML = '<div class="absolute inset-0 flex items-center justify-center text-red-500 font-bold bg-white/80 text-xl">暫無資料</div>';
                            });
                    }
                }
            });
        };

        window.setupRadicalGame = function(correctRadical, componentsArray, hintText) {
            const optionsContainer = document.getElementById('radical-options');
            const statusText = document.getElementById('game-status');
            optionsContainer.innerHTML = '';
            statusText.textContent = '快找出這個字的部首！';
            statusText.className = 'text-sm md:text-xl font-bold text-amber-600 bg-amber-100 px-3 md:px-5 py-1.5 md:py-3 rounded-full w-full text-center';

            if(correctRadical === '？') {
                optionsContainer.innerHTML = '<span class="text-gray-500 text-lg">暫無部首資料</span>';
                return;
            }

            let wrongOptions = [];
            while(wrongOptions.length < 2) {
                const random = commonRadicals[Math.floor(Math.random() * commonRadicals.length)];
                const baseCorrect = correctRadical.split(' ')[0]; 
                if(random !== baseCorrect && !wrongOptions.includes(random)) {
                    wrongOptions.push(random);
                }
            }

            let allOptions = [correctRadical, ...wrongOptions];
            allOptions.sort(() => Math.random() - 0.5);

            allOptions.forEach(opt => {
                const btn = document.createElement('button');
                const displayOpt = opt.split(' ')[0]; 
                
                btn.className = 'w-16 h-16 sm:w-20 sm:h-20 lg:w-24 lg:h-24 text-3xl sm:text-4xl lg:text-5xl kaishu font-bold bg-white border-2 border-gray-300 rounded-xl md:rounded-2xl shadow-sm hover:bg-gray-50 transition-all duration-300 focus:outline-none hover:-translate-y-1';
                btn.textContent = displayOpt;
                
                btn.onclick = function() {
                    if (opt === correctRadical) {
                        window.playSound('correct');
                        window.updateCombo(true); 
                        this.className = 'w-16 h-16 sm:w-20 sm:h-20 lg:w-24 lg:h-24 text-3xl sm:text-4xl lg:text-5xl kaishu font-bold bg-green-100 border-4 border-green-500 text-green-700 rounded-xl md:rounded-2xl shadow-md pop transition-all duration-300';
                        
                        const currentChar = document.getElementById('info-char').textContent;
                        if (!window.completedTasks.has(`radical_${currentChar}`)) {
                            window.completedTasks.add(`radical_${currentChar}`);
                            window.addScore(1);
                            statusText.innerHTML = '✨ 答對了！解鎖拆字與防錯密碼！ <span class="text-yellow-600">⭐ +1</span>';
                        } else {
                            statusText.innerHTML = '✨ 答對了！解鎖拆字與防錯密碼！';
                        }
                        
                        statusText.className = 'text-sm md:text-xl font-bold text-green-800 bg-green-200 px-3 md:px-5 py-1.5 md:py-3 rounded-full pop transition-all w-full text-center';
                        window.unlockComponents(componentsArray, hintText);
                        
                        Array.from(optionsContainer.children).forEach(child => {
                            child.onclick = null;
                            if(child !== this) {
                                child.style.opacity = '0.4';
                                child.style.transform = 'scale(0.95)';
                                child.style.pointerEvents = 'none';
                            }
                        });
                    } else {
                        window.playSound('wrong');
                        window.updateCombo(false); 
                        this.className = 'w-16 h-16 sm:w-20 sm:h-20 lg:w-24 lg:h-24 text-3xl sm:text-4xl lg:text-5xl kaishu font-bold bg-gray-100 border-2 border-gray-200 text-gray-400 rounded-xl md:rounded-2xl shake transition-all duration-300';
                        statusText.innerHTML = '🤔 不對喔，再試試！';
                        statusText.className = 'text-sm md:text-xl font-bold text-red-600 bg-red-100 px-3 md:px-5 py-1.5 md:py-3 rounded-full transition-all w-full text-center';
                        setTimeout(() => this.classList.remove('shake'), 400);
                    }
                };
                optionsContainer.appendChild(btn);
            });
        };

        window.unlockComponents = function(componentsArray, hintText) {
            const section = document.getElementById('components-section');
            const compContainer = document.getElementById('info-components');
            const hintBox = document.getElementById('char-hint-box');
            const hintTextEl = document.getElementById('char-hint-text');
            
            section.style.opacity = '1';
            section.style.filter = 'grayscale(0%)';
            
            compContainer.innerHTML = '';
            if(componentsArray && Array.isArray(componentsArray)){
                componentsArray.forEach((comp, index) => {
                    const span = document.createElement('span');
                    span.className = "text-4xl md:text-5xl text-teal-800 kaishu font-bold bg-teal-50 border-2 border-teal-200 px-4 py-2 rounded-xl shadow-sm";
                    span.textContent = comp;
                    compContainer.appendChild(span);
                    
                    if (index < componentsArray.length - 1) {
                        const plus = document.createElement('span');
                        plus.className = "text-3xl text-gray-400 font-bold self-center px-2";
                        plus.textContent = "+";
                        compContainer.appendChild(plus);
                    }
                });
            }

            if(hintText) {
                hintTextEl.textContent = hintText;
                hintBox.classList.remove('hidden');
                hintBox.classList.add('fade-in-up');
            }

            compContainer.classList.remove('pop');
            void compContainer.offsetWidth; 
            compContainer.classList.add('pop');
        };

        window.playAnimation = function() {
            window.playSound('pop');
            if(window.writer) {
                window.writer.cancelQuiz();
                window.setQuizMessage('👀 看清楚，跟著動畫記筆順...', 'teal');
                window.writer.animateCharacter();
            }
        };

        window.startQuiz = function() {
            window.playSound('pop');
            if(window.writer) {
                window.writer.cancelQuiz(); 
                window.currentMistakes = 0;
                window.usedHint = false;
                window.setQuizMessage('🎯 在田字格裡寫寫看！寫錯再試就好。完成可得 2 顆星星喔！⭐', 'teal');
                
                document.getElementById('success-animation').classList.add('hidden');
                document.getElementById('success-animation').classList.remove('star-animate');

                window.writer.quiz({
                    leniency: 1.5, 
                    showHintAfterMisses: 1, 
                    onMistake: function(strokeData) {
                        window.playSound('wrong');
                        window.updateCombo(false); 
                        window.currentMistakes++;
                        if (window.currentMistakes >= 1 && !window.usedHint) {
                            window.usedHint = true;
                            window.setQuizMessage('💡 沒關係，跟著淡淡的底字描一次！(安慰獎1分)', 'blue');
                        } else if (!window.usedHint) {
                            window.setQuizMessage('💪 哎呀！筆畫順序不太對，再來一次！', 'red');
                        }
                    },
                    onCorrectStroke: function(strokeData) {
                        window.playSound('pop');
                        if (!window.usedHint) window.setQuizMessage('✅ 漂亮！繼續寫下一筆。', 'teal');
                    },
                    onComplete: function(summaryData) {
                        window.playSound('star');
                        
                        if (window.currentMistakes === 0 && !window.usedHint) {
                            window.updateCombo(true);
                        }
                        
                        window.showCheer(); 
                        
                        const currentChar = document.getElementById('info-char').textContent;
                        if (!window.completedTasks.has(`write_${currentChar}`)) {
                            window.completedTasks.add(`write_${currentChar}`);
                            if (window.usedHint) {
                                window.addScore(1);
                                window.setQuizMessage('🌟 完成了！獲得 1 顆星星安慰獎！下次自己寫會拿到2顆喔！', 'blue');
                            } else {
                                window.addScore(2);
                                window.setQuizMessage('🌟 完美通關！自己寫出來了，獲得 2 顆星星！', 'green');
                            }
                        } else {
                            window.setQuizMessage('🌟 完美通關！字寫得太漂亮了！', 'green');
                        }
                        
                        const starAnim = document.getElementById('success-animation');
                        starAnim.classList.remove('hidden');
                        starAnim.classList.remove('star-animate');
                        void starAnim.offsetWidth; 
                        starAnim.classList.add('star-animate');
                    }
                });
            }
        };

        // 🌟 啟動初始化
        window.init = function() {
            window.renderWordList();
        };

        window.onload = window.init;
    </script>
</body>
</html>
